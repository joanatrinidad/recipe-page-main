<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" initial-scale="1.0" />
    <title>Recipe Page</title>
    <link rel="stylesheet" href="/assets/style/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <img src="/assets/images/image-omelette.jpeg" />
      <h1 class="title"></h1>
      <span class="subtitle"></span>

      <div class="preparationTime">
        <h3 class="prepTitle" style="color: violet"></h3>
        <div>
          <ul>
            <li class="total"></li>
            <li class="prep"></li>
            <li class="cooking"></li>
          </ul>
        </div>
      </div>

      <h2 class="ingredientsTitle" style="color: indianred"></h2>
      <ul>
        <li class="ing1"></li>
        <li class="ing2"></li>
        <li class="ing3"></li>
        <li class="ing4"></li>
        <li class="ing5"></li>
      </ul>

      <div class="instructions">
        <h2 class="instructionsTitle" style="color: indianred"></h2>
        <ol>
          <li class="ins1"></li>
          <li class="ins2"></li>
          <li class="ins3"></li>
          <li class="ins4"></li>
          <li class="ins5"></li>
          <li class="ins6"></li>
        </ol>
      </div>

      <div class="nutritionCard">
        <h2 class="nutritionTitle"></h2>
        <span class="nutritionSub"></span>
        <div class="nutritionContainers">
          <div class="nutritionRow1">
            <span class="nutritionCal"></span>
            <span class="totalCal"></span>
          </div>

          <div class="nutritionRow2">
            <span class="nutritionCarbs"></span>
            <span class="totalCarbs"></span>
          </div>

          <div class="nutritionRow3">
            <span class="nutritionProtein"></span>
            <span class="totalProtein"></span>
          </div>

          <div class="nutritionRow4">
            <span class="nutritionFat"></span>
            <span class="totalFat"></span>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { recipe } from "./src/lang/text.js";
      document.querySelector(".title").textContent = recipe.header.title;
      document.querySelector(".subtitle").textContent = recipe.header.subtitle;
      document.querySelector(".prepTitle").textContent =
        recipe.preparation.title;
      document.querySelector(".total").textContent = recipe.preparation.total;
      document.querySelector(".prep").textContent = recipe.preparation.prep;
      document.querySelector(".cooking").textContent = recipe.preparation.cook;

      document.querySelector(".ingredientsTitle").textContent =
        recipe.ingredients.title;
      document.querySelector(".ing1").textContent = recipe.ingredients.ing1;
      document.querySelector(".ing2").textContent = recipe.ingredients.ing2;
      document.querySelector(".ing3").textContent = recipe.ingredients.ing3;
      document.querySelector(".ing4").textContent = recipe.ingredients.ing2;
      document.querySelector(".ing5").textContent = recipe.ingredients.ing3;

      document.querySelector(".instructionsTitle").textContent =
        recipe.instructions.title;

      const { label1, body1 } = recipe.instructions.ins1;
      document.querySelector(
        ".ins1",
      ).innerHTML = `<strong>${label1}:</strong> ${body1}`;

      const { label2, body2 } = recipe.instructions.ins2;
      document.querySelector(
        ".ins2",
      ).innerHTML = `<strong>${label2}:</strong> ${body2}`;

      const { label3, body3 } = recipe.instructions.ins3;
      document.querySelector(
        ".ins3",
      ).innerHTML = `<strong>${label3}:</strong> ${body3}`;

      const { label4, body4 } = recipe.instructions.ins4;
      document.querySelector(
        ".ins4",
      ).innerHTML = `<strong>${label4}:</strong> ${body4}`;

      const { label5, body5 } = recipe.instructions.ins5;
      document.querySelector(
        ".ins5",
      ).innerHTML = `<strong>${label5}:</strong> ${body5}`;

      const { label6, body6 } = recipe.instructions.ins6;
      document.querySelector(
        ".ins6",
      ).innerHTML = `<strong>${label6}:</strong> ${body6}`;

      document.querySelector(".nutritionTitle").textContent =
        recipe.nutrition.title;

      document.querySelector(".nutritionSub").textContent =
        recipe.nutrition.subtitle;

      document.querySelector(".nutritionCal").textContent =
        recipe.nutrition.cal;

      document.querySelector(".totalCal").textContent =
        recipe.nutrition.totalCal;

      document.querySelector(".nutritionCarbs").textContent =
        recipe.nutrition.carbs;

      document.querySelector(".totalCarbs").textContent =
        recipe.nutrition.totalCarbs;

      document.querySelector(".nutritionProtein").textContent =
        recipe.nutrition.protein;

      document.querySelector(".totalProtein").textContent =
        recipe.nutrition.totalProtein;

      document.querySelector(".nutritionFat").textContent =
        recipe.nutrition.fat;

      document.querySelector(".totalFat").textContent =
        recipe.nutrition.totalFat;
    </script>
  </body>
</html>
